<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light only" />
    <title>Your email is confirmed</title>
    <style>
      :root { color-scheme: light; }
      @media (max-width: 600px) {
        .container { width: 100% !important; }
        .px { padding-left: 16px !important; padding-right: 16px !important; }
        .btn { display: block !important; width: 100% !important; }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#faf9f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#2f3330;letter-spacing:0.01em;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#faf9f6;">
      <tr>
        <td align="center" style="padding:28px 16px;">
          <table role="presentation" class="container" width="600" cellspacing="0" cellpadding="0" border="0" style="width:600px;max-width:600px;">
            <tr>
              <td class="px" style="padding:8px 24px 16px 24px;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="width:100%;">
                  <tr>
                    <td style="vertical-align:middle;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                        <tr>
                          <td style="vertical-align:middle;padding-right:10px;">
                            <img
                              src="./seren-logo.svg"
                              width="28"
                              height="28"
                              alt="Seren"
                              style="display:block;border:0;outline:none;text-decoration:none;border-radius:8px;"
                            />
                          </td>
                          <td style="vertical-align:middle;">
                            <div style="font-weight:750;font-size:14px;letter-spacing:0.16em;text-transform:uppercase;color:#2f3330;">
                              Seren
                            </div>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
                <div style="margin-top:10px;height:1px;background:rgba(120,124,119,0.25);"></div>
              </td>
            </tr>

            <tr>
              <td class="px" style="padding:0 24px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff;border-radius:24px;overflow:hidden;border:1px solid rgba(175,179,174,0.22);box-shadow:0 12px 44px -14px rgba(47,51,48,0.10);">
                  <tr>
                    <td style="padding:28px 24px 10px 24px;">
                      <div style="display:inline-block;background:#edeeea;border:1px solid rgba(175,179,174,0.22);color:#3f5266;font-weight:700;font-size:11px;padding:6px 10px;border-radius:999px;">
                        Confirmed
                      </div>
                      <h1 style="margin:12px 0 0 0;font-size:22px;line-height:1.25;color:#2f3330;letter-spacing:-0.01em;">
                        Your email is confirmed
                      </h1>
                      <p style="margin:12px 0 0 0;font-size:14px;line-height:1.7;color:#5c605c;">
                        Hi {{first_name}} — you’re all set. Your Seren account is now active.
                      </p>
                    </td>
                  </tr>

                  <tr>
                    <td align="left" style="padding:18px 24px 10px 24px;">
                      <a class="btn" href="{{app_url}}"
                         style="display:inline-block;background:#3d6374;background-image:linear-gradient(135deg,#3d6374 0%,#305767 100%);color:#f0f9ff;text-decoration:none;font-weight:750;font-size:14px;line-height:46px;height:46px;padding:0 18px;border-radius:14px;border:1px solid rgba(47,51,48,0.12);">
                        Open Seren
                      </a>
                      <p style="margin:12px 0 0 0;font-size:12px;line-height:1.7;color:#5c605c;">
                        Signed in as <strong style="color:#2f3330;">{{email}}</strong>
                      </p>
                    </td>
                  </tr>

                  <tr>
                    <td style="padding:16px 24px 24px 24px;">
                      <div style="border-top:1px solid rgba(175,179,174,0.32);margin:0 0 14px 0;"></div>
                      <p style="margin:0;font-size:12px;line-height:1.7;color:#5c605c;">
                        If you didn’t confirm this email, contact us at
                        <a href="mailto:{{support_email}}" style="color:#3d6374;text-decoration:underline;">{{support_email}}</a>.
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td class="px" style="padding:14px 24px 0 24px;">
                <p style="margin:0;font-size:11px;line-height:1.6;color:#787c77;">
                  © {{year}} Seren · {{company_address}} ·
                  <a href="{{support_url}}" style="color:#3d6374;text-decoration:underline;">Support</a>
                </p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
